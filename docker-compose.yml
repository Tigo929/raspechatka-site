# Локальная инфраструктура разработки.
# Запуск: docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: raspechatka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: raspechatka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d raspechatka"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
