version: "3.9"

# Локальная инфраструктура разработки для «Распечатка».
# Использовать только для dev/test — не для production.
# Запуск: docker compose -f docker-compose.dev.yml up -d
# Остановка: docker compose -f docker-compose.dev.yml down

services:
  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: raspechatka_dev
      POSTGRES_PASSWORD: dev_password_change_in_production
      POSTGRES_DB: raspechatka_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raspechatka_dev -d raspechatka_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Этап 4D: BullMQ queue, rate limiting.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── MinIO (S3-совместимое хранилище) ─────────────────────────────────────
  # Этап 4E: хранение файлов заявок.
  minio:
    # Pin to a specific release. Check https://hub.docker.com/r/minio/minio/tags for newer stable.
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: raspechatka_dev
      MINIO_ROOT_PASSWORD: dev_minio_password_change_in_production
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
